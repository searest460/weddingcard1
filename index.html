<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dhanya & Rahul Wedding</title>
  <script type="module" crossorigin src="./assets/index-BBIwAgSn.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-bYuRLTYZ.css">
</head>
<body>
  <div id="root"></div>
  <script>
    (function(){
      function replaceInTextNode(n){
        if(!n || !n.nodeValue) return;
        var s=n.nodeValue;
        var r=s;
        r=r.replace(/Rahul\s*&\s*Sof(?:i\u00ED|í|ia|ía|Ã\u00eda)/g,'Rahul & Dhanya');
        r=r.replace(/Sof(?:i\u00ED|í|ia|ía|Ã\u00eda)/g,'Dhanya');
        if(r!==s){n.nodeValue=r;}
      }
      function findByText(root, text){
        var walker=document.createTreeWalker(root||document.body,NodeFilter.SHOW_ELEMENT);
        var node;
        while((node=walker.nextNode())){
          if(node && node.textContent && node.textContent.trim().toLowerCase().includes(text.toLowerCase())){
            return node;
          }
        }
        return null;
      }
      function replaceMenuWithEvents(){
        // Identify the Italian menu by any of its unique markers
        var anchors=[
          findByText(document.body,'Aperitivo'),
          findByText(document.body,'APERITIVO'),
          findByText(document.body,'Vini della Tenuta'),
          findByText(document.body,'Primo'),
          findByText(document.body,'Secondo'),
          findByText(document.body,'Dolce')
        ].filter(Boolean);
        if(anchors.length===0) return;
        // Choose a reference element
        var ref=anchors[0];
        // Climb up to a compact container that holds the menu block
        var container=ref;
        for(var i=0;i<6 && container; i++){
          var t=(container.textContent||'').toLowerCase();
          var score=0;
          ['aperitivo','primo','secondo','dolce','vini della tenuta','bruschetta','risotto','filetto'].forEach(k=>{ if(t.indexOf(k)>-1) score++; });
          if(score>=3) break;
          container=container.parentElement;
        }
        if(!container) return;
        if(container.getAttribute && container.getAttribute('data-events-injected')==='1') return;

        // Build events markup
        var html=[
          '<div class="text-center mb-6">',
            '<h2 class="font-display text-base tracking-widest uppercase" style="color:#5C2018">Events</h2>',
          '</div>',
          '<div class="text-center mb-5">',
            '<h3 class="font-display text-sm tracking-widest uppercase mb-1" style="color:#5C2018">Rang Jo Lagyo — “Mehendi”</h3>',
            '<p class="font-body text-xs" style="color:#5C2018"><strong>Place:</strong> Malepurath House</p>',
            '<p class="font-body text-[10px] italic" style="color:#5C2018"><strong>Date & Time:</strong> 11th September 2026 • 3:00 PM</p>',
            '<p class="font-body text-[10px]" style="color:#5C2018"><strong>Dress Code:</strong> Shades of Pink</p>',
          '</div>',
          '<div class="text-center mb-5">',
            '<h3 class="font-display text-sm tracking-widest uppercase mb-1" style="color:#5C2018">Tal Se Taal Mila — “Podva & Sangeet”</h3>',
            '<p class="font-body text-xs" style="color:#5C2018"><strong>Place:</strong> Malepurath House</p>',
            '<p class="font-body text-[10px] italic" style="color:#5C2018"><strong>Date & Time:</strong> 12th September 2026 • 5:00 PM</p>',
            '<p class="font-body text-[10px]" style="color:#5C2018"><strong>Dress Code:</strong> Women — Sharara/Gharara • Men — Dupatta & Kurta</p>',
          '</div>',
          '<div class="text-center mb-5">',
            '<h3 class="font-display text-sm tracking-widest uppercase mb-1" style="color:#5C2018">Saat Phere — “Wedding”</h3>',
            '<p class="font-body text-xs" style="color:#5C2018"><strong>Place:</strong> Akhil Convention Centre</p>',
            '<p class="font-body text-[10px] italic" style="color:#5C2018"><strong>Date & Time:</strong> 13th September 2026 • 10:00 AM</p>',
            '<p class="font-body text-[10px] italic" style="color:#5C2018"><strong>Muhurtam:</strong> 11:30 AM – 12:15 PM</p>',
            '<p class="font-body text-[10px]" style="color:#5C2018"><strong>Dress Code:</strong> WOMEN — Davani • MEN — Mundu & Kurta</p>',
          '</div>',
          '<div class="text-center mb-2">',
            '<h3 class="font-display text-sm tracking-widest uppercase mb-1" style="color:#5C2018">Reception</h3>',
            '<p class="font-body text-xs" style="color:#5C2018"><strong>Place:</strong> Kollam, Kerala</p>',
            '<p class="font-body text-[10px] italic" style="color:#5C2018"><strong>Date & Time:</strong> 13th September 2026 • 5:00 PM</p>',
            '<p class="font-body text-[10px]" style="color:#5C2018"><strong>Dress:</strong> Be classy</p>',
          '</div>'
        ].join('');

        // Replace the menu container content directly
        container.setAttribute && container.setAttribute('data-events-injected','1');
        container.innerHTML=html;
      }
      function sweep(root){
        if(!root) return;
        if(root.nodeType===Node.TEXT_NODE){replaceInTextNode(root);return;}
        var walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT);
        var node;
        while((node=walker.nextNode())){replaceInTextNode(node);}
      }
      function init(){
        sweep(document.body);
        replaceMenuWithEvents();
      }
      document.addEventListener('DOMContentLoaded',init);
      var observer=new MutationObserver(function(muts){
        for(var i=0;i<muts.length;i++){
          var m=muts[i];
          if(m.type==='childList'){
            m.addedNodes&&m.addedNodes.forEach(function(n){sweep(n); replaceMenuWithEvents();});
          }else if(m.type==='characterData'){
            sweep(m.target); replaceMenuWithEvents();
          }
        }
      });
      observer.observe(document.documentElement,{subtree:true,childList:true,characterData:true});
      var runs=0;
      var iv=setInterval(function(){
        sweep(document.body);
        replaceMenuWithEvents();
        runs++;
        if(runs>20){clearInterval(iv);}
      },250);
    })();
  </script>
</body>
</html>
